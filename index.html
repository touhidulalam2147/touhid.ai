<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touhid AI (Real Working)</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
  background:#07111f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
}
button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}
textarea{
  width:100%;
  height:100px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 Touhid AI (Real)</h2>

<input type="file" id="imageInput">
<br>

<button onclick="runOCR()">Run OCR</button>
<button onclick="solveText()">Solve</button>

<h3>Extracted Text:</h3>
<textarea id="output"></textarea>

<h3>AI Answer:</h3>
<textarea id="answer"></textarea>

<hr>

<h3>Chat</h3>
<input type="text" id="chatInput" placeholder="Ask anything...">
<button onclick="chat()">Send</button>

<p id="chatOutput"></p>

</div>

<script>

const API_KEY = "AIzaSyB57L_JJLmQiT7ZjbRx55FBjENQF92a5l8";

async function runOCR(){
  const file = document.getElementById("imageInput").files[0];
  if(!file) return alert("Image select কর");

  document.getElementById("output").value = "Processing...";

  const { data } = await Tesseract.recognize(file, 'eng');
  document.getElementById("output").value = data.text;
}

async function askAI(prompt){
  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
    {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        contents:[{parts:[{text: prompt}]}]
      })
    }
  );

  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function solveText(){
  const text = document.getElementById("output").value;
  if(!text) return alert("Text নাই");

  document.getElementById("answer").value = "Thinking...";

  const result = await askAI("Solve this question:\n" + text);
  document.getElementById("answer").value = result;
}

async function chat(){
  const msg = document.getElementById("chatInput").value;
  if(!msg) return;

  document.getElementById("chatOutput").innerText = "Thinking...";

  const reply = await askAI(msg);
  document.getElementById("chatOutput").innerText = reply;
}

</script>

</body>
</html>
